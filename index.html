<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* CONTAINER ANIMATION */
.container {
    width: 90%;
    max-width: 400px;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1.2s ease forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 {
    font-size: 22px;
    margin-bottom: 30px;
}

/* ENVELOPE */
.envelope-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 25px;
    cursor: pointer;
    animation: fadeUp 1.5s ease forwards;
}

.envelope {
    width: 180px;
    height: 110px;
    background: #ff6b81;
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    transition: transform 0.2s;
    animation: float 3s ease-in-out infinite;
}

.envelope:active {
    transform: scale(0.95);
}

/* floating halus */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
}

.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff4757;
    clip-path: polygon(0 0, 100% 0, 50% 60%);
    transform-origin: top;
    transition: 0.6s;
}

.opened .flap {
    transform: rotateX(180deg);
}

/* TEXT KECIL */
.hint {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 10px;
    animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 0.6; }
}

/* BUTTON TIDAK */
.no {
    width: 80%;
    max-width: 250px;
    padding: 14px;
    border-radius: 30px;
    font-size: 16px;
    background: transparent;
    color: #ccc;
    border: 1px solid #ccc;
    margin-top: 15px;
    position: relative;
    transition: transform 0.25s ease, opacity 0.3s;
}
</style>
</head>

<body>

<div class="container">

    <h1>Assalamualaikum, Daffa ingin sampein sesuatu</h1>

    <!-- Amplop -->
    <div class="envelope-wrapper" onclick="openLetter()" id="env">
        <div class="envelope">
            <div class="flap"></div>
        </div>
        <div class="hint">Klik amplop untuk buka</div>
    </div>

    <!-- Tombol Tidak -->
    <button class="no" id="noBtn">Ga Dulu</button>

</div>

<script>
function openLetter() {
    const env = document.getElementById("env");
    env.classList.add("opened");

    setTimeout(() => {
        window.location.href = "surat.html";
    }, 800);
}

const noBtn = document.getElementById("noBtn");

let clickCount = 0;

function moveButton(e) {
    e.preventDefault();

    clickCount++;

    const x = Math.random() * 100 - 50;
    const y = Math.random() * 100 - 50;

    noBtn.style.transform = `translate(${x}px, ${y}px)`;

    if (clickCount === 1) {
        noBtn.innerText = "Yakin?";
    } else if (clickCount === 2) {
        noBtn.innerText = "Beneran?";
    } else if (clickCount === 3) {
        noBtn.innerText = "Daffa tunggu yaa";
        noBtn.style.opacity = "0.7";
    }
}

noBtn.addEventListener("touchstart", moveButton);
noBtn.addEventListener("click", moveButton);
</script>

</body>
</html>
